# ─────────────────────────────────────────────────────────────────────────────
# DEVELOPMENT DEFAULTS  (overridden in prod by application-prod.properties)
# ─────────────────────────────────────────────────────────────────────────────

# ── Database (local Docker) ────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/url_shortener}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Error responses ────────────────────────────────────────────────────────────
server.error.include-message=always
server.error.include-binding-errors=always

# ── JWT ────────────────────────────────────────────────────────────────────────
# Dev secret only — never use this in production.
jwt.secret=${JWT_SECRET:snipr-dev-jwt-hmac-secret-at-least-thirty-two-bytes-long}
jwt.expiration=172800000

# ── CORS ───────────────────────────────────────────────────────────────────────
frontend.url=${FRONTEND_URL:http://localhost:5173}

# ── Razorpay ───────────────────────────────────────────────────────────────────
razorpay.keyId=${RAZORPAY_KEY_ID:}
razorpay.keySecret=${RAZORPAY_KEY_SECRET:}
razorpay.webhookSecret=${RAZORPAY_WEBHOOK_SECRET:}
razorpay.planId.pro.monthly=${RAZORPAY_PLAN_ID_PRO_MONTHLY:}
razorpay.planId.business.monthly=${RAZORPAY_PLAN_ID_BUSINESS_MONTHLY:}

# ── Logging (dev: verbose) ─────────────────────────────────────────────────────
logging.level.org.springframework.security=DEBUG
logging.level.com.url.shortener=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework=DEBUG
logging.level.org.springframework.web.servlet=TRACE