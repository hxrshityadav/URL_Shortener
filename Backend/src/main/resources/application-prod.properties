# ─────────────────────────────────────────────────────────────────────────────
# PRODUCTION PROFILE  (active when -Dspring.profiles.active=prod)
# All secrets come from Heroku Config Vars — NOTHING is hardcoded here.
# ─────────────────────────────────────────────────────────────────────────────

# ── Database ──────────────────────────────────────────────────────────────────
# Heroku Postgres injects DATABASE_URL as:  postgres://user:pass@host:port/dbname
# Spring needs jdbc:postgresql://... so we convert via the JDBC_DATABASE_* vars
# that the Heroku Postgres add-on also provides automatically.
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${JDBC_DATABASE_USERNAME}
spring.datasource.password=${JDBC_DATABASE_PASSWORD}

# ── HikariCP connection pool (tuned for Heroku Postgres free tier: 25 max conns) ──
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
# "update" keeps existing data safe while auto-creating any missing tables.
# Switch to "validate" once the schema is stable.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Required for Heroku Postgres SSL connections
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ── Server ─────────────────────────────────────────────────────────────────────
# PORT is injected by Heroku at runtime via the Procfile -Dserver.port=$PORT
server.error.include-message=always
server.error.include-binding-errors=always
# Compress responses to save bandwidth on Heroku's free dyno
server.compression.enabled=true
server.compression.mime-types=application/json,application/javascript,text/css,text/plain

# ── JWT ────────────────────────────────────────────────────────────────────────
# Set JWT_SECRET in Heroku Config Vars — must be 32+ characters
jwt.secret=${JWT_SECRET}
jwt.expiration=172800000

# ── CORS ───────────────────────────────────────────────────────────────────────
# Set FRONTEND_URL in Heroku Config Vars e.g. https://snipr.vercel.app
frontend.url=${FRONTEND_URL}

# ── Razorpay (payments) ────────────────────────────────────────────────────────
razorpay.keyId=${RAZORPAY_KEY_ID:}
razorpay.keySecret=${RAZORPAY_KEY_SECRET:}
razorpay.webhookSecret=${RAZORPAY_WEBHOOK_SECRET:}
razorpay.planId.pro.monthly=${RAZORPAY_PLAN_ID_PRO_MONTHLY:}
razorpay.planId.business.monthly=${RAZORPAY_PLAN_ID_BUSINESS_MONTHLY:}

# ── Logging (production: WARN only — keeps Heroku logs clean) ─────────────────
logging.level.root=WARN
logging.level.com.url.shortener=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
